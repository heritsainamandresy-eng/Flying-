name: Build
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ArtemSneeze/buildozer-action@v1
        with:
          command: buildozer android debug
      - uses: actions/upload-artifact@v4
        with:
          name: package
          path: bin/*.apk
          
